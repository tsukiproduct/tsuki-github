name: Auto Merge Claude Branch to Main

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"

          # 既存のオープンPRを確認
          EXISTING=$(gh pr list --base main --head "$BRANCH" --state open --json number -q '.[0].number')

          if [ -z "$EXISTING" ]; then
            # PRを作成
            PR_NUMBER=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Auto: $BRANCH → main" \
              --body "Automated PR from Claude branch" \
              --json number -q '.number')
            echo "Created PR #$PR_NUMBER"
          else
            PR_NUMBER="$EXISTING"
            echo "Using existing PR #$PR_NUMBER"
          fi

          # マージ
          gh pr merge "$PR_NUMBER" --merge --auto --delete-branch=false
