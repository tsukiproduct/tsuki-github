<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深夜の呪縛 ―KOBE NOIR―</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --nes-black: #000000;
  --nes-white: #fcfcfc;
  --nes-red: #f83800;
  --nes-darkred: #881400;
  --nes-blue: #0078f8;
  --nes-darkblue: #000088;
  --nes-gray: #7c7c7c;
  --nes-lightgray: #bcbcbc;
  --nes-green: #00a800;
  --nes-yellow: #f8b800;
  --nes-purple: #7800f8;
  --nes-cyan: #00f8f8;
  --nes-orange: #f87858;
  --nes-brown: #503000;
  --nes-blood: #8b0000;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:'DotGothic16','Share Tech Mono',monospace;
}
#console-frame {
  background:#2a1a00;
  border-radius:12px;
  padding:18px 18px 14px;
  box-shadow:0 0 40px rgba(248,56,0,0.3),0 0 80px rgba(0,0,0,0.8);
  max-width:780px;
  width:100%;
}
#screen-bezel {
  background:#111;
  border-radius:8px;
  padding:10px;
  box-shadow:inset 0 0 20px rgba(0,0,0,0.8);
}
#crt {
  position:relative;
  background:#000;
  border-radius:4px;
  overflow:hidden;
}
#crt::after {
  content:'';
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.13) 3px,rgba(0,0,0,0.13) 4px);
  pointer-events:none;
  z-index:10;
}
#crt::before {
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.7) 100%);
  pointer-events:none;
  z-index:11;
}
#main-area {
  display:flex;
  gap:0;
}
#scene-area {
  flex:1;
}
#scene-canvas {
  display:block;
  width:100%;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}
#side-panel {
  width:130px;
  background:#000088;
  border-left:2px solid #0078f8;
  padding:6px 4px;
  font-size:9px;
  color:#fcfcfc;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.side-label {
  color:#f8b800;
  font-size:8px;
  border-bottom:1px solid #0078f8;
  padding-bottom:2px;
  margin-bottom:1px;
}
#trust-bar-outer {
  background:#881400;
  height:6px;
  border:1px solid #f83800;
  border-radius:2px;
  overflow:hidden;
}
#trust-bar-inner {
  height:100%;
  background:#00a800;
  transition:width 0.5s;
}
#clue-list {
  font-size:8px;
  color:#bcbcbc;
  max-height:80px;
  overflow:hidden;
  line-height:1.4;
}
#suspect-list {
  font-size:8px;
  color:#f87858;
  line-height:1.5;
}
#text-area {
  background:#000;
  border-top:2px solid #0078f8;
  padding:8px 10px 6px;
  min-height:70px;
}
#narrator-label {
  color:#f8b800;
  font-size:10px;
  margin-bottom:4px;
}
#text-output {
  color:#fcfcfc;
  font-size:11px;
  line-height:1.6;
  min-height:40px;
}
#cmd-area {
  background:#000088;
  border-top:2px solid #0078f8;
  padding:6px 8px;
}
#btn-row1, #btn-row2 {
  display:flex;
  gap:4px;
  margin-bottom:4px;
  flex-wrap:wrap;
}
.cmd-btn {
  background:#000;
  color:#00f8f8;
  border:1px solid #0078f8;
  padding:3px 7px;
  font-family:'DotGothic16',monospace;
  font-size:10px;
  cursor:pointer;
  border-radius:2px;
}
.cmd-btn:hover { background:#000088; color:#fcfcfc; }
.cmd-btn:active { background:#0078f8; color:#000; }
#input-row {
  display:flex;
  gap:4px;
  align-items:center;
}
#cmd-label { color:#f8b800; font-size:10px; margin-right:2px; }
#cmd-input {
  flex:1;
  background:#000;
  color:#fcfcfc;
  border:1px solid #0078f8;
  padding:3px 6px;
  font-family:'DotGothic16',monospace;
  font-size:11px;
  outline:none;
}
#cmd-ok {
  background:#000088;
  color:#f8b800;
  border:1px solid #f8b800;
  padding:3px 10px;
  font-family:'DotGothic16',monospace;
  font-size:11px;
  cursor:pointer;
}
#cmd-ok:hover { background:#f8b800; color:#000; }
#controller-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
  padding:0 4px;
}
.d-pad {
  display:grid;
  grid-template-columns:repeat(3,14px);
  grid-template-rows:repeat(3,14px);
  gap:1px;
}
.d-pad span {
  background:#4a3010;
  border:1px solid #7c5020;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:7px;
  color:#7c7c7c;
  border-radius:2px;
}
.d-pad span.center { background:#3a2000; }
#console-title {
  color:#7c5020;
  font-size:10px;
  font-family:'Share Tech Mono',monospace;
  letter-spacing:2px;
}
.ctrl-btns {
  display:flex;
  gap:6px;
  align-items:center;
}
.btn-small {
  background:#4a3010;
  color:#7c7c7c;
  border:1px solid #7c5020;
  padding:2px 6px;
  font-size:8px;
  font-family:'Share Tech Mono',monospace;
  border-radius:1px;
}
.btn-circle {
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:8px;
  font-family:'Share Tech Mono',monospace;
  border:none;
  cursor:default;
}
.btn-a { background:#f83800; color:#fff; }
.btn-b { background:#503000; color:#bcbcbc; }

/* overlays */
#flash-overlay {
  position:fixed;
  inset:0;
  background:rgba(248,56,0,0);
  pointer-events:none;
  z-index:100;
  transition:background 0.1s;
}
#darkness-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0);
  pointer-events:none;
  z-index:99;
  transition:background 1s;
}
#chapter-banner {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#000;
  border:3px solid #f83800;
  color:#f83800;
  font-size:20px;
  padding:16px 32px;
  z-index:200;
  display:none;
  text-align:center;
  box-shadow:0 0 30px rgba(248,56,0,0.5);
}
#save-indicator {
  position:fixed;
  top:10px;
  right:10px;
  background:#000088;
  color:#f8b800;
  padding:3px 8px;
  font-size:10px;
  border:1px solid #f8b800;
  z-index:300;
  display:none;
}
#start-screen {
  position:fixed;
  inset:0;
  background:#000;
  z-index:500;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
}
#start-screen h1 {
  color:#f83800;
  font-size:22px;
  text-shadow:0 0 10px rgba(248,56,0,0.8);
  text-align:center;
  line-height:1.4;
}
#start-screen p {
  color:#bcbcbc;
  font-size:11px;
}
.start-btn {
  background:#000;
  color:#00f8f8;
  border:2px solid #00f8f8;
  padding:8px 24px;
  font-family:'DotGothic16',monospace;
  font-size:14px;
  cursor:pointer;
  margin:4px;
}
.start-btn:hover { background:#00f8f8; color:#000; }
#side-chap { font-size:9px; color:#00f8f8; }
#side-loc { font-size:9px; color:#fcfcfc; word-break:break-all; }
#crt-red-tint {
  position:absolute;
  inset:0;
  background:rgba(248,56,0,0);
  pointer-events:none;
  z-index:9;
  transition:background 1s;
}
</style>
</head>
<body>
<div id="flash-overlay"></div>
<div id="darkness-overlay"></div>
<div id="chapter-banner"></div>
<div id="save-indicator">💾 SAVE</div>

<div id="start-screen">
  <h1>深夜の呪縛<br>―KOBE NOIR―</h1>
  <p>ファミコン風ホラーアドベンチャー</p>
  <div id="start-btns"></div>
</div>

<div id="console-frame">
  <div id="screen-bezel">
    <div id="crt">
      <div id="crt-red-tint"></div>
      <div id="main-area">
        <div id="scene-area">
          <canvas id="scene-canvas" width="256" height="168"></canvas>
        </div>
        <div id="side-panel">
          <div class="side-label">CHAPTER</div>
          <div id="side-chap">第一章</div>
          <div class="side-label">LOCATION</div>
          <div id="side-loc">捜査本部</div>
          <div class="side-label">CLUES <span id="clue-count">0</span>/10</div>
          <div id="clue-list"></div>
          <div class="side-label">TRUST</div>
          <div id="trust-bar-outer"><div id="trust-bar-inner" style="width:100%"></div></div>
          <div id="trust-num" style="font-size:8px;color:#bcbcbc;margin-top:2px;">100%</div>
          <div class="side-label">SUSPECTS</div>
          <div id="suspect-list">
            <div>ナカゼ</div>
            <div>ヒメノ</div>
            <div>ドウガン</div>
          </div>
        </div>
      </div>
      <div id="text-area">
        <div id="narrator-label">◆ NARRATOR</div>
        <div id="text-output"></div>
      </div>
      <div id="cmd-area">
        <div id="btn-row1">
          <button class="cmd-btn" onclick="cmdBtn('しらべる')">調べる</button>
          <button class="cmd-btn" onclick="cmdBtn('じんもん')">尋問</button>
          <button class="cmd-btn" onclick="cmdBtn('いどう')">移動</button>
          <button class="cmd-btn" onclick="cmdBtn('てちょう')">手帳</button>
        </div>
        <div id="btn-row2">
          <button class="cmd-btn" onclick="cmdFull('ツキマオ')">ツキマオ</button>
          <button class="cmd-btn" onclick="cmdFull('てちょう')">日記</button>
          <button class="cmd-btn" onclick="cmdBtn('たいほ')">逮捕</button>
          <button class="cmd-btn" onclick="cmdFull('ヘルプ')">ヘルプ</button>
        </div>
        <div id="input-row">
          <span id="cmd-label">CMD&gt;</span>
          <input id="cmd-input" type="text" maxlength="30" placeholder="コマンドを入力...">
          <button id="cmd-ok" onclick="execCmd()">OK</button>
        </div>
      </div>
    </div>
  </div>
  <div id="controller-bar">
    <div class="d-pad">
      <span></span><span>▲</span><span></span>
      <span>◀</span><span class="center"></span><span>▶</span>
      <span></span><span>▼</span><span></span>
    </div>
    <div id="console-title">KOBE NOIR © 2025</div>
    <div class="ctrl-btns">
      <span class="btn-small">SELECT</span>
      <span class="btn-small">START</span>
      <span class="btn-circle btn-b">B</span>
      <span class="btn-circle btn-a">A</span>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let G = {
  chapter: 1,
  location: '捜査本部',
  clues: [],
  flags: {},
  tsukimaoTrust: 100,
  suspectStatus: {},
  ending: null
};

const LOCATIONS = ['捜査本部','事件現場','サエキ証券','波止場','ヒメノのバー','ナカゼのアパート','ウラベの店','月真猫の自宅','マツリのアパート','廃工場'];
const LOC_ALIAS = {
  '警察署':'捜査本部','本部':'捜査本部','警察':'捜査本部',
  '事件':'事件現場','現場':'事件現場','マンション':'事件現場',
  '証券':'サエキ証券','会社':'サエキ証券','サエキ':'サエキ証券',
  '波止場':'波止場','港':'波止場','桟橋':'波止場',
  'バー':'ヒメノのバー','ヒメノ':'ヒメノのバー','BAR':'ヒメノのバー',
  'ナカゼ':'ナカゼのアパート','アパート':'ナカゼのアパート',
  'ウラベ':'ウラベの店','情報屋':'ウラベの店','将棋':'ウラベの店',
  '月真猫':'月真猫の自宅','ツキマオ自宅':'月真猫の自宅','自宅':'月真猫の自宅',
  'マツリ':'マツリのアパート','夢逢':'マツリのアパート','まつり':'マツリのアパート',
  '廃工場':'廃工場','工場':'廃工場'
};

// ===== SAVE/LOAD =====
function saveGame() {
  localStorage.setItem('kobeNoir2', JSON.stringify(G));
  const si = document.getElementById('save-indicator');
  si.style.display = 'block';
  setTimeout(()=>si.style.display='none', 1000);
}
function loadGame() {
  const d = localStorage.getItem('kobeNoir2');
  if (d) { G = JSON.parse(d); return true; }
  return false;
}

// ===== START SCREEN =====
function initStartScreen() {
  const hasSave = !!localStorage.getItem('kobeNoir2');
  const div = document.getElementById('start-btns');
  div.innerHTML = '';
  if (hasSave) {
    const cont = document.createElement('button');
    cont.className = 'start-btn'; cont.textContent = '▶ つづきから';
    cont.onclick = () => { loadGame(); startGame(); };
    div.appendChild(cont);
  }
  const newg = document.createElement('button');
  newg.className = 'start-btn'; newg.textContent = hasSave ? '★ はじめから' : '▶ はじめる';
  newg.onclick = () => startGame();
  div.appendChild(newg);
}
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  updateUI();
  drawScene();
  typeText('神戸、2025年。\n深夜2時。港区の高級マンションで男の遺体が発見された。\n被害者はサエキ・コウジ（52）。大手証券会社の社長だ。\n\n刑事カミジョウ・リョウ、お前の出番だ。\n部下の月真猫が脇に立っている。', 'narrator');
}

// ===== UI UPDATE =====
function updateUI() {
  const chap = ['第一章','第二章','第三章','終章'];
  document.getElementById('side-chap').textContent = chap[G.chapter-1] || '終章';
  document.getElementById('side-loc').textContent = G.location;
  document.getElementById('clue-count').textContent = G.clues.length;
  document.getElementById('clue-list').textContent = G.clues.map(c=>c.short).join('\n');
  const t = G.tsukimaoTrust;
  document.getElementById('trust-bar-inner').style.width = t + '%';
  document.getElementById('trust-bar-inner').style.background = t>50?'#00a800':t>25?'#f8b800':'#f83800';
  document.getElementById('trust-num').textContent = t + '%';
  // red tint
  const tint = document.getElementById('crt-red-tint');
  if (t <= 20) tint.style.background = `rgba(248,56,0,${0.08 + (20-t)*0.004})`;
  else tint.style.background = 'rgba(248,56,0,0)';
}

// ===== TEXT =====
let typeTimer = null;
function typeText(text, speaker='narrator') {
  const out = document.getElementById('text-output');
  const label = document.getElementById('narrator-label');
  const colors = { narrator:'#fcfcfc', tsukimao:'#00f8f8', matsuri:'#f878f8', horror:'#f83800', system:'#f8b800' };
  label.style.color = colors[speaker]||'#f8b800';
  const speakers = { narrator:'◆ NARRATOR', tsukimao:'◆ 月真猫', matsuri:'◆ マツリ', horror:'◆ !!!', system:'◆ SYSTEM' };
  label.textContent = speakers[speaker]||'◆ '+speaker;
  out.style.color = colors[speaker]||'#fcfcfc';
  if (typeTimer) clearInterval(typeTimer);
  out.textContent = '';
  let i = 0;
  typeTimer = setInterval(()=>{
    if (i < text.length) { out.textContent += text[i]; i++; }
    else clearInterval(typeTimer);
  }, 28);
}

// ===== FLASH =====
function flashRed() {
  const f = document.getElementById('flash-overlay');
  f.style.background = 'rgba(248,56,0,0.5)';
  setTimeout(()=>f.style.background='rgba(248,56,0,0)',300);
}
function darken(cb) {
  const d = document.getElementById('darkness-overlay');
  d.style.background = 'rgba(0,0,0,0.95)';
  setTimeout(()=>{ d.style.background='rgba(0,0,0,0)'; if(cb)cb(); }, 1500);
}
function showChapterBanner(text, cb) {
  const b = document.getElementById('chapter-banner');
  b.textContent = text;
  b.style.display = 'block';
  setTimeout(()=>{ b.style.display='none'; if(cb)cb(); }, 2500);
}

// ===== CLUES =====
const CLUES = {
  blood_text:       { short:'血文字', full:'窓ガラスの血文字「助けて……ツキ」', chapter:1 },
  saeki_background: { short:'サエキの素性', full:'サエキは連続詐欺師。多くの人を破産させた', chapter:1 },
  nakaze_motive:    { short:'ナカゼの動機', full:'ナカゼはサエキに全財産を奪われた', chapter:1 },
  himeno_alibi:     { short:'ヒメノの証言', full:'ヒメノ「死の前夜、月が出る夜は気をつけろと言っていた」', chapter:2 },
  dougan_testimony: { short:'ドウガンの証言', full:'ドウガン「3年前、月真猫がサエキ殺害の協力を依頼してきた」', chapter:2 },
  nakaze_testimony2:{ short:'ナカゼの目撃', full:'ナカゼ「マンション前で刑事の部下に似た人物を見た」', chapter:2 },
  parent_suicide:   { short:'月一家の入水自殺', full:'ウラベ「月という夫婦が5年前に神戸港から入水自殺した」', chapter:2 },
  tsuki_diary:      { short:'月真猫の手帳', full:'手帳に「サエキは必ず裁かれる。俺が裁く。」', chapter:3 },
  matsuri_confession:{ short:'マツリの告白', full:'マツリ「やりましょう、と私が言ったんです」', chapter:3 },
  factory_key:      { short:'廃工場の鍵', full:'月真猫の自宅で廃工場への鍵を発見', chapter:3 },
};

function addClue(key) {
  if (G.clues.find(c=>c.key===key)) return false;
  const c = CLUES[key];
  if (!c) return false;
  G.clues.push({ key, short:c.short, full:c.full });
  flashRed();
  saveGame();
  updateUI();
  checkChapterAdvance();
  return true;
}

// ===== CHAPTER ADVANCE =====
function checkChapterAdvance() {
  if (G.chapter===1 && G.clues.length>=3) advanceChapter(2);
  else if (G.chapter===2 && G.clues.length>=6 && G.flags.parent_truth) advanceChapter(3);
  else if (G.chapter===3 && G.clues.length>=8 && G.tsukimaoTrust<=20) advanceChapter(4);
}
function advanceChapter(n) {
  if (G.chapter >= n) return;
  G.chapter = n;
  const names = {2:'第二章　歪んだ真実',3:'第三章　深淵への扉',4:'終章　真夜中の告白'};
  saveGame();
  showChapterBanner(names[n], ()=>{
    updateUI();
    drawScene();
    const msgs = {
      2:'【第二章】\n新たな証言が出てきた。事件の闇が深くなる。',
      3:'【第三章】\nウラベが廃工場とマツリのアパートの場所を教えてくれた。\n真相はもうすぐそこだ。',
      4:'【終章】\n月真猫から連絡が来た。\n「廃工場で、全部話します」'
    };
    typeText(msgs[n]||'', 'system');
  });
}

// ===== COMMAND =====
function cmdBtn(prefix) {
  const inp = document.getElementById('cmd-input');
  inp.value = prefix + ' ';
  inp.focus();
}
function cmdFull(cmd) {
  document.getElementById('cmd-input').value = cmd;
  execCmd();
}
document.getElementById('cmd-input').addEventListener('keydown', e=>{
  if (e.key==='Enter') execCmd();
});
function execCmd() {
  const inp = document.getElementById('cmd-input');
  const raw = inp.value.trim();
  inp.value = '';
  if (!raw) return;
  processCommand(raw);
}

function processCommand(raw) {
  const cmd = raw.replace(/\s+/g,' ').trim();
  const lower = cmd.toLowerCase();

  // ヘルプ
  if (lower==='ヘルプ'||lower==='help'||lower==='へるぷ') {
    typeText('【コマンド一覧】\n「いどう ＋場所名」移動\n「しらべる ＋対象」調査\n「じんもん ＋人名」尋問\n「ツキマオ」部下に話す\n「てちょう」捜査メモ\n「たいほ ＋人名」逮捕\n「にっき」手帳（月自宅のみ）\n「さいだん」祭壇（マツリ部屋のみ）\n「てがみ」手紙（マツリ部屋のみ）', 'system');
    return;
  }

  // 手帳
  if (lower==='てちょう'||lower==='メモ') {
    if (G.clues.length===0) { typeText('手帳はまだ空だ。', 'narrator'); return; }
    typeText('【捜査手帳】\n'+G.clues.map((c,i)=>`${i+1}.${c.full}`).join('\n'), 'system');
    return;
  }

  // 移動
  if (cmd.startsWith('いどう')||cmd.startsWith('移動')) {
    const dest = cmd.replace(/^(いどう|移動)\s*/,'');
    moveLocation(dest); return;
  }

  // 調べる
  if (cmd.startsWith('しらべる')||cmd.startsWith('調べる')||cmd.startsWith('調査')) {
    const target = cmd.replace(/^(しらべる|調べる|調査)\s*/,'');
    investigate(target); return;
  }

  // 尋問
  if (cmd.startsWith('じんもん')||cmd.startsWith('尋問')) {
    const target = cmd.replace(/^(じんもん|尋問)\s*/,'');
    interrogate(target); return;
  }

  // ツキマオ
  if (lower==='ツキマオ'||lower==='つきまお'||lower==='月真猫') {
    talkTsukimao(); return;
  }

  // たいほ
  if (cmd.startsWith('たいほ')||cmd.startsWith('逮捕')) {
    const target = cmd.replace(/^(たいほ|逮捕)\s*/,'');
    arrest(target); return;
  }

  // にっき（月真猫の自宅限定）
  if (lower==='にっき'||lower==='日記') {
    if (G.location==='月真猫の自宅') {
      readDiary(); return;
    }
    typeText('ここにはそういうものはない。', 'narrator'); return;
  }

  // さいだん
  if (lower==='さいだん'||lower==='祭壇') {
    if (G.location==='マツリのアパート') {
      investigateAltar(); return;
    }
    typeText('ここにはそういうものはない。', 'narrator'); return;
  }

  // てがみ
  if (lower==='てがみ'||lower==='手紙') {
    if (G.location==='マツリのアパート') {
      readLetter(); return;
    }
    typeText('ここにはそういうものはない。', 'narrator'); return;
  }

  // 終章コマンド
  if (G.chapter>=4) {
    if (lower==='たいほ'||lower==='逮捕'||cmd.includes('逮捕')) { arrest('月真猫'); return; }
    if (cmd.includes('きく')||cmd.includes('話を聞く')||cmd.includes('最後まで')) { endingAPlus(); return; }
    if (cmd.includes('しょうこ')||cmd.includes('証拠')&&cmd.includes('燃')||cmd.includes('もやす')) { endingB(); return; }
  }

  typeText(`「${cmd}」……よくわからない。\n「ヘルプ」でコマンド一覧を確認できる。`, 'narrator');
}

// ===== MOVE =====
function moveLocation(dest) {
  let resolved = dest;
  for (const [k,v] of Object.entries(LOC_ALIAS)) {
    if (dest.includes(k)) { resolved=v; break; }
  }
  if (!LOCATIONS.includes(resolved)) {
    typeText(`「${dest}」という場所は分からない。\n行ける場所：捜査本部、事件現場、サエキ証券、波止場、ヒメノのバー、ナカゼのアパート、ウラベの店、月真猫の自宅${G.chapter>=3?'、マツリのアパート、廃工場':''}`, 'narrator');
    return;
  }
  if ((resolved==='マツリのアパート'||resolved==='廃工場') && G.chapter<3) {
    typeText('まだその場所の情報がない。もっと捜査を進めよう。', 'narrator'); return;
  }
  darken(()=>{
    G.location = resolved;
    updateUI();
    drawScene();
    saveGame();
    describeLocation(resolved);
  });
}

  if (t.includes('ヒメノ')||t.includes('姫野')) { interrogateHimeno(); return; }

  if (t.includes('ウラベ')||t.includes('浦部')||t.includes('うらべ')) { interrogateUrabe(); return; }

  typeText(`「${target}」という人物が見当たらない。`, 'narrator');
}

}

function endingAPlus() {
  if (G.chapter < 4) { typeText('今は関係ない。', 'narrator'); return; }

      showRestartBtn();

function endingB() {

function showRestartBtn() {
  setTimeout(()=>{
    const out = document.getElementById('text-output');
    out.innerHTML += '<br><br><button class="cmd-btn" onclick="restartGame()" style="font-size:12px;padding:6px 14px;">もう一度プレイ</button>';
  }, 2000);
}

function restartGame() {
  G = { chapter:1, location:'捜査本部', clues:[], flags:{}, tsukimaoTrust:100, suspectStatus:{}, ending:null };
  localStorage.removeItem('kobeNoir2');
  updateUI();
  drawScene();
  typeText('神戸、2025年。\n深夜2時。港区の高級マンションで男の遺体が発見された。\n被害者はサエキ・コウジ（52）。大手証券会社の社長だ。\n\n刑事カミジョウ・リョウ、お前の出番だ。', 'narrator');
}

// ===== PIXEL ART SCENES =====
function drawScene() {
  const canvas = document.getElementById('scene-canvas');
  const ctx = canvas.getContext('2d');
  const W = 256, H = 168;
  ctx.clearRect(0,0,W,H);

  const scenes = {
    '捜査本部': drawHQ,
    '事件現場': drawCrimeScene,
    'サエキ証券': drawCompany,
    '波止場': drawWharf,
    'ヒメノのバー': drawBar,
    'ナカゼのアパート': drawApartment,
    'ウラベの店': drawUrabeShop,
    '月真猫の自宅': drawTsukiHome,
    'マツリのアパート': drawMatsuriRoom,
    '廃工場': drawFactory,
  };
  const fn = scenes[G.location];
  if (fn) fn(ctx, W, H);
  else drawHQ(ctx, W, H);
}

function px(ctx,x,y,w,h,color){ ctx.fillStyle=color; ctx.fillRect(x,y,w,h); }

function drawHQ(ctx,W,H) {
  // 壁・床
  px(ctx,0,0,W,H,'#000088');
  px(ctx,0,H-30,W,30,'#7c5020');
  // 蛍光灯
  px(ctx,60,8,136,6,'#fcfcfc');
  px(ctx,68,6,4,14,'#bcbcbc');
  px(ctx,184,6,4,14,'#bcbcbc');
  // デスク
  px(ctx,20,90,100,40,'#503000');
  px(ctx,20,88,100,6,'#7c5020');
  px(ctx,130,90,100,40,'#503000');
  px(ctx,130,88,100,6,'#7c5020');
  // 被害者写真（ホワイトボード）
  px(ctx,90,20,76,60,'#fcfcfc');
  px(ctx,92,22,72,56,'#bcbcbc');
  // 顔写真
  px(ctx,112,28,32,32,'#f87858');
  px(ctx,118,30,20,14,'#f8b800');
  px(ctx,116,42,24,12,'#f87858');
  // ×印（赤）
  for(let i=0;i<32;i++){
    px(ctx,112+i,28+i,2,2,'#f83800');
    px(ctx,143-i,28+i,2,2,'#f83800');
  }
  // 月真猫シルエット
  px(ctx,190,70,20,60,'#0078f8');
  px(ctx,195,60,10,14,'#0078f8');
  // 目（シアン）
  px(ctx,196,64,3,3,'#00f8f8');
  px(ctx,201,64,3,3,'#00f8f8');
  // テキスト
  ctx.fillStyle='#f8b800';
  ctx.font='8px DotGothic16,monospace';
  ctx.fillText('捜査本部',4,12);
  ctx.fillStyle='#f83800';
  ctx.font='7px DotGothic16,monospace';
  ctx.fillText('CHAPTER '+G.chapter,180,12);
}

function drawCrimeScene(ctx,W,H) {
  // 夜空
  px(ctx,0,0,W,100,'#000088');
  // 星
  [[20,10],[50,20],[90,8],[140,15],[200,6],[230,18],[10,40],[180,30]].forEach(([x,y])=>{
    px(ctx,x,y,2,2,'#fcfcfc');
  });
  // 月
  px(ctx,200,10,24,24,'#f8b800');
  px(ctx,206,12,12,20,'#f8b800');
  // ビル
  px(ctx,0,30,60,100,'#000088');
  px(ctx,0,30,60,70,'#0078f8');
  for(let y=32;y<95;y+=12) for(let x=4;x<55;x+=10){ px(ctx,x,y,6,8,'#f8b800'); }
  // マンション
  px(ctx,60,20,136,110,'#000088');
  px(ctx,60,20,136,90,'#0078f8');
  for(let y=24;y<105;y+=14) for(let x=64;x<190;x+=16){ px(ctx,x,y,10,10,'#f8b800'); }
  // 窓（血文字の窓）
  px(ctx,100,40,30,20,'#f83800');
  // 血文字
  ctx.fillStyle='#881400';
  ctx.font='7px DotGothic16,monospace';
  ctx.fillText('ツキ',104,54);
  // 地面
  px(ctx,0,H-28,W,28,'#000000');
  // 遺体シルエット
  px(ctx,90,H-28,60,8,'#881400');
  px(ctx,90,H-24,12,14,'#881400');
  // 血だまり
  px(ctx,80,H-22,40,10,'#8b0000');
  ctx.fillStyle='#f8b800';
  ctx.font='8px DotGothic16,monospace';

}

function drawCompany(ctx,W,H) {
  // 空

  px(ctx,40,10,176,120,'#0078f8');
  for(let y=14;y<125;y+=14) for(let x=44;x<210;x+=18){
    px(ctx,x,y,12,10,y%28<14?'#bcbcbc':'#7c7c7c');

  // 地面
  px(ctx,0,H-30,W,30,'#503000');
  // エントランス
  px(ctx,100,100,56,30,'#000088');
  px(ctx,110,102,16,28,'#00f8f8');
  px(ctx,130,102,16,28,'#00f8f8');
  // 受付嬢
  px(ctx,148,95,12,35,'#f87858');
  px(ctx,151,88,6,10,'#f8b800');
  ctx.fillStyle='#f8b800';
  ctx.font='8px DotGothic16,monospace';
  ctx.fillText('サエキ証券',4,12);
}

function drawWharf(ctx,W,H) {
  // 夜空
  px(ctx,0,0,W,80,'#000000');

  px(ctx,60,70,136,14,'#503000');

  px(ctx,0,40,80,80,'#7c7c7c');
  px(ctx,0,30,80,14,'#503000');
  px(ctx,10,44,20,20,'#000000');
  px(ctx,40,44,20,20,'#000000');
  px(ctx,180,40,76,80,'#7c7c7c');

  ctx.fillStyle='#f83800';

  ctx.font='8px DotGothic16,monospace';
  ctx.fillText('波止場',4,12);
}

function drawBar(ctx,W,H) {
  px(ctx,0,0,W,H,'#000000');
  // カウンター
  px(ctx,20,80,216,60,'#503000');
  px(ctx,20,78,216,6,'#7c5020');
  // ボトル棚
  px(ctx,0,20,256,60,'#503000');
  const bottleColors=['#f83800','#0078f8','#00a800','#7800f8','#f8b800'];
  for(let x=8;x<240;x+=18){ px(ctx,x,24,10,52,bottleColors[Math.floor(x/18)%5]); px(ctx,x+3,22,4,4,'#bcbcbc'); }
  // ヒメノ
  px(ctx,110,56,20,80,'#f878f8');
  px(ctx,114,44,12,16,'#f8b800');

  px(ctx,108,100,4,2,'#f83800');

  px(ctx,150,72,12,18,'#00f8f8');
  ctx.fillStyle='#f8b800';
  ctx.font='8px DotGothic16,monospace';

}

function drawApartment(ctx,W,H) {
  px(ctx,0,0,W,H,'#000088');
  px(ctx,0,H-24,W,24,'#503000');
  // 壁記事
  const articleColors=['#fcfcfc','#bcbcbc','#7c7c7c'];
  for(let y=10;y<140;y+=18) for(let x=10;x<220;x+=38){
    px(ctx,x,y,34,14,articleColors[(x+y)%3]);
    px(ctx,x+2,y+2,28,4,'#000088');
    px(ctx,x+2,y+7,20,3,'#000088');
  }
  // サエキ写真に×
  px(ctx,100,50,40,40,'#f87858');
  for(let i=0;i<40;i++){
    px(ctx,100+i,50+i,3,3,'#f83800');
    px(ctx,139-i,50+i,3,3,'#f83800');
  }
  // ナカゼ
  px(ctx,200,90,20,60,'#0078f8');
  px(ctx,203,80,14,14,'#f87858');
  ctx.fillStyle='#f8b800';
  ctx.font='8px DotGothic16,monospace';
  ctx.fillText('ナカゼのアパート',4,12);
}

function drawUrabeShop(ctx,W,H) {
  // レンガ
  for(let y=0;y<H;y+=10) for(let x=0;x<W;x+=20){
    px(ctx,x+(y%20<10?0:10),y,18,8,'#881400');
    px(ctx,x+(y%20<10?0:10),y+8,18,1,'#000000');
  }
  // 将棋盤
  px(ctx,80,80,96,72,'#f8b800');
  for(let i=0;i<=9;i++){
    px(ctx,80+i*10,80,2,72,'#503000');
    px(ctx,80,80+i*8,96,2,'#503000');
  }
  // 駒
  [[90,84],[100,84],[110,84],[120,84],[130,84],[140,84],[90,92],[130,92],[90,100],[100,100]].forEach(([x,y])=>{
    px(ctx,x,y,8,8,'#503000');
    px(ctx,x+1,y+1,6,6,'#7c5020');
  });
  // ウラベ
  px(ctx,30,70,24,80,'#7c7c7c');
  px(ctx,34,58,16,16,'#f87858');
  ctx.fillStyle='#f8b800';
  ctx.font='8px DotGothic16,monospace';
  ctx.fillText('ウラベの店',4,12);
}

function drawTsukiHome(ctx,W,H) {
  px(ctx,0,0,W,H,'#000000');
  px(ctx,0,H-24,W,24,'#503000');
  // 本棚
  px(ctx,0,10,80,120,'#7c5020');
  const bookColors=['#f83800','#0078f8','#7800f8','#00a800','#f8b800','#f87858'];
  for(let y=14;y<120;y+=14) for(let x=2;x<76;x+=8){ px(ctx,x,y,6,12,bookColors[(x+y)%6]); }
  // 机・鍵付き引き出し
  px(ctx,90,90,120,50,'#503000');
  px(ctx,90,88,120,6,'#7c5020');
  px(ctx,100,100,40,20,'#7c7c7c');
  px(ctx,118,106,6,6,'#f8b800');
  // 床の写真
  [[160,120],[180,130],[200,115],[170,140]].forEach(([x,y])=>{
    ctx.save(); ctx.translate(x,y); ctx.rotate((x%3-1)*0.3);
    px(ctx,-12,-8,24,18,'#fcfcfc');
    px(ctx,-10,-6,20,14,'#f87858');
    ctx.restore();
  });
  // 月真猫シルエット（奥）
  px(ctx,200,60,18,90,'#000088');
  px(ctx,204,50,10,14,'#000088');
  ctx.fillStyle='#00f8f8';
  ctx.font='8px DotGothic16,monospace';
  ctx.fillText('月真猫の自宅',4,12);
}

function drawMatsuriRoom(ctx,W,H) {
  px(ctx,0,0,W,H,'#000000');
  // 曼陀羅壁紙
  ctx.fillStyle='#7800f8';
  for(let y=0;y<H;y+=30) for(let x=0;x<W;x+=30){
    ctx.beginPath();
    ctx.arc(x+15,y+15,12,0,Math.PI*2);
    ctx.stroke();
    for(let r=0;r<6;r++){
      const a=r*Math.PI/3;
      ctx.beginPath();
      ctx.moveTo(x+15,y+15);
      ctx.lineTo(x+15+Math.cos(a)*12,y+15+Math.sin(a)*12);
      ctx.stroke();
    }
  }
  px(ctx,0,0,W,H,'rgba(0,0,0,0.5)');
  // 祭壇
  px(ctx,80,80,96,60,'#503000');
  px(ctx,80,78,96,6,'#7c5020');
  // 写真（両親）
  px(ctx,100,56,56,36,'#fcfcfc');
  px(ctx,102,58,52,32,'#7c7c7c');
  // 蝋燭
  [[90,70],[164,70],[112,70],[148,70]].forEach(([x,y])=>{
    px(ctx,x,y,4,16,'#f8b800');
    px(ctx,x+1,y-4,2,4,'#f83800');
  });
  // 目のない人形
  [[88,100],[100,100],[112,100],[130,100],[142,100],[154,100],[166,100]].forEach(([x,y])=>{
    px(ctx,x,y,8,18,'#bcbcbc');
    px(ctx,x+1,y-8,6,10,'#f8b800');
    px(ctx,x+2,y-6,2,2,'#000000');
    px(ctx,x+5,y-6,2,2,'#000000');
  });
  // マツリ
  px(ctx,4,80,16,80,'#f878f8');
  px(ctx,6,68,12,16,'#f8b800');
  ctx.fillStyle='#f878f8';
  ctx.font='8px DotGothic16,monospace';
  ctx.fillText('マツリのアパート',4,12);
}

function drawFactory(ctx,W,H) {
  // 夜空
  px(ctx,0,0,W,H,'#000000');
  // 星
  [[10,10],[30,20],[60,8],[100,15],[160,6],[200,12],[240,20]].forEach(([x,y])=>px(ctx,x,y,2,2,'#fcfcfc'));
  // 月
  px(ctx,10,10,20,20,'#f8b800');
  // 鉄骨
  ctx.fillStyle='#7c7c7c';
  for(let x=0;x<W;x+=40){
    ctx.fillRect(x,20,6,H);
    ctx.fillRect(x,50,40,4);
    ctx.fillRect(x,90,40,4);
  }
  // 錆
  [[20,60],[80,70],[150,55],[210,80]].forEach(([x,y])=>px(ctx,x,y,10,6,'#f87858'));
  // 奥の光
  px(ctx,110,100,36,68,'rgba(248,184,0,0.3)');
  for(let r=0;r<5;r++){
    px(ctx,118+r*4,110,4,50,'rgba(248,184,0,0.15)');
  }
  // 月真猫シルエット
  px(ctx,120,80,16,88,'#000000');
  px(ctx,123,68,10,16,'#000000');
  // 光る目
  px(ctx,124,72,3,3,'#00f8f8');
  px(ctx,129,72,3,3,'#00f8f8');
  ctx.fillStyle='#f83800';
  ctx.font='8px DotGothic16,monospace';
  ctx.fillText('廃工場',4,12);

  // 終章なら選択肢表示
  if (G.chapter >= 4) {
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(0,130,W,38);
    ctx.fillStyle='#f8b800';
    ctx.font='8px DotGothic16,monospace';
    ctx.fillText('「たいほ 月真猫」→ ENDING A',8,143);
    ctx.fillText('「きく」最後まで聞く→ ENDING A+',8,153);
    ctx.fillText('「しょうこ もやす」→ ENDING B',8,163);
  }
}
